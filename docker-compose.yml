# Postgres only: app runs on host with mix phx.server.
# Use: docker compose up -d db
# Then: export DATABASE_URL=ecto://postgres:postgres@localhost/sensor_array_dev && mix ecto.create && mix phx.server
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sensor_array_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 5
    ports: ["5432:5432"]

volumes:
  pgdata:
